# Docker Compose for OpenScientist
#
# Usage:
#   Development: Set OPENSCIENTIST_DEV_MODE=true in .env for auto-reload & mock auth
#
#   Production:  docker compose up  (OPENSCIENTIST_DEV_MODE unset or false)

services:
  postgres:
    image: postgres:18
    restart: ${OPENSCIENTIST_RESTART_POLICY:-unless-stopped}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openscientist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openscientist_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-openscientist}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      # Init script creates openscientist_admin role for RLS bypass
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openscientist} -d ${POSTGRES_DB:-openscientist}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Restricted Docker API proxy (R6). The ONLY container that mounts the host
  # Docker socket. The web app and the per-job agent containers reach it over
  # TCP (DOCKER_HOST=tcp://docker-socket-proxy:2375) instead of mounting the raw
  # socket, so they can only call the whitelisted endpoints below (create/start/
  # stop/wait/list/inspect/logs/remove containers + inspect/pull images).
  # Everything else — exec, info, networks, volumes, build, swarm, secrets — is
  # denied, closing the container-escape path an unrestricted socket mount opens.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    restart: ${OPENSCIENTIST_RESTART_POLICY:-unless-stopped}
    environment:
      CONTAINERS: 1   # list / inspect / logs / create agent + executor containers
      IMAGES: 1       # inspect / pull the agent + executor images
      POST: 1         # allow the POST verbs above (create / start / stop / wait)
      DELETE: 1       # allow container removal (job cleanup)
      PING: 1         # docker.from_env() liveness check
      VERSION: 1      # docker.from_env() API-version negotiation
      # Everything else explicitly denied (these are the defaults; listed for clarity):
      INFO: 0
      EXEC: 0
      NETWORKS: 0
      VOLUMES: 0
      BUILD: 0
      COMMIT: 0
      AUTH: 0
      SYSTEM: 0
      SWARM: 0
      SECRETS: 0
      CONFIGS: 0
      SERVICES: 0
      TASKS: 0
      NODES: 0
      PLUGINS: 0
      DISTRIBUTION: 0
      SESSION: 0
      EVENTS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # No published ports: only reachable on the internal compose network.

  openscientist:
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    platform: ${OPENSCIENTIST_PLATFORM:-}
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    ports:
      - "${PORT:-8080}:8080"
    # In dev mode, restart=no; in production, restart=unless-stopped
    restart: ${OPENSCIENTIST_RESTART_POLICY:-unless-stopped}
    # Map host.docker.internal to the host gateway so the in-page chat's codex
    # agent can reach a host-local model endpoint (e.g. Ollama at
    # http://host.docker.internal:11434/v1). Mirrors what job_container/runner.py
    # adds for agent containers. Harmless for providers that do not use it.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # All credentials and settings come from .env (ANTHROPIC_API_KEY, OPENSCIENTIST_PROVIDER, etc.)
    env_file:
      - path: .env
        required: false
    environment:
      # Database URLs use the 'postgres' service hostname — must override any .env value
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openscientist}:${POSTGRES_PASSWORD:-openscientist_dev_password}@postgres:5432/${POSTGRES_DB:-openscientist}
      ADMIN_DATABASE_URL: postgresql+asyncpg://openscientist_admin:${POSTGRES_PASSWORD:-openscientist_dev_password}@postgres:5432/${POSTGRES_DB:-openscientist}
      PORT: ${PORT:-8080}

      # Talk to Docker only via the restricted socket proxy (the
      # docker-socket-proxy service below) — the app never sees the raw host
      # socket. Sibling/agent containers are created through this endpoint. (R6)
      DOCKER_HOST: tcp://docker-socket-proxy:2375

      # Phenix: PHENIX_HOST_PATH points to a Linux x86_64 Phenix directory on the
      # host.  It is mounted read-only at /opt/phenix; PHENIX_PATH is the
      # container-internal path used by phenix_setup.py and agent tools.
      PHENIX_PATH: ${PHENIX_HOST_PATH:+/opt/phenix}
      PHENIX_HOST_PATH: ${PHENIX_HOST_PATH:-}

      # GCP credentials: the host file path is passed separately so agent containers
      # can mount it on the host side (GOOGLE_APPLICATION_CREDENTIALS is set in Dockerfile)
      GCP_CREDENTIALS_HOST_PATH: ${GCP_CREDENTIALS_FILE:-}

      # Codex (OpenAI) auth: CODEX_AUTH_FILE is the codex CLI auth.json on the host
      # (ChatGPT login). It is mounted read-only into this web container, which copies
      # it into each per-job CODEX_HOME for the agent. Unused when OPENAI_API_KEY is set.
      CODEX_AUTH_HOST_PATH: ${CODEX_AUTH_FILE:+/app/codex-auth.json}

      # Container isolation defaults
      OPENSCIENTIST_USE_CONTAINER_ISOLATION: ${OPENSCIENTIST_USE_CONTAINER_ISOLATION:-true}
      OPENSCIENTIST_EXECUTOR_IMAGE: ${OPENSCIENTIST_EXECUTOR_IMAGE:-openscientist-executor:latest}
      OPENSCIENTIST_AGENT_IMAGE: ${OPENSCIENTIST_AGENT_IMAGE:-openscientist-agent:latest}
      OPENSCIENTIST_EXECUTOR_MEMORY: ${OPENSCIENTIST_EXECUTOR_MEMORY:-2g}
      OPENSCIENTIST_EXECUTOR_CPU: ${OPENSCIENTIST_EXECUTOR_CPU:-0.5}
      OPENSCIENTIST_AGENT_MEMORY: ${OPENSCIENTIST_AGENT_MEMORY:-8g}
      OPENSCIENTIST_AGENT_CPU: ${OPENSCIENTIST_AGENT_CPU:-2.0}
      OPENSCIENTIST_AGENT_PLATFORM: ${OPENSCIENTIST_AGENT_PLATFORM:-}
      OPENSCIENTIST_HOST_PROJECT_DIR: ${OPENSCIENTIST_HOST_PROJECT_DIR:-}

      # Derived settings not expressible in .env
      PYTHONDONTWRITEBYTECODE: ${OPENSCIENTIST_DEV_MODE:+1}

    volumes:
      - ./jobs:/app/jobs
      - ./data:/app/data
      - ./src:/app/src  # Mount source for live reload in dev mode

      # Mount GCP credentials if using Vertex AI (set GCP_CREDENTIALS_FILE in .env)
      - ${GCP_CREDENTIALS_FILE:-/dev/null}:/app/gcp-credentials.json:ro

      # Mount codex CLI auth if using OpenAI/codex ChatGPT login (set CODEX_AUTH_FILE in .env)
      - ${CODEX_AUTH_FILE:-/dev/null}:/app/codex-auth.json:ro

      # Mount Linux Phenix installation if available (set PHENIX_HOST_PATH in .env)
      - ${PHENIX_HOST_PATH:-/dev/null}:/opt/phenix:ro

      # Mount built-in skills directory
      - ./skills:/app/skills:ro

      # Registry auth for pulling the agent/executor images from a PRIVATE
      # registry (e.g. ACR). Point OPENSCIENTIST_DOCKER_CONFIG at a docker
      # config.json holding pull credentials; the app's docker client
      # (docker.from_env(), talking to the docker-socket-proxy over TCP) sends
      # them as registry auth on images/create. Defaults to an empty-but-valid
      # config so local/dev with public images works unchanged. Without valid
      # creds, jobs fail at startup with
      # "401 ... images/create ... authentication required".
      - ${OPENSCIENTIST_DOCKER_CONFIG:-./docker/empty-docker-config.json}:/root/.docker/config.json:ro

      # NOTE: the host Docker socket is deliberately NOT mounted here. Sibling
      # container creation goes through the docker-socket-proxy service via
      # DOCKER_HOST (set above), which restricts the reachable API surface. (R6)

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "openscientist.mode=${OPENSCIENTIST_DEV_MODE:-production}"

  # openscientist-agent: build-only service — never started by compose.
  # Agent containers are spawned at runtime by JobContainerRunner.
  # Build with:  docker compose build openscientist-agent
  #          or  docker build -f Dockerfile.agent -t openscientist-agent:latest .
  openscientist-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: openscientist-agent:latest
    profiles: ["build-only"]  # Excluded from `docker compose up`
    entrypoint: ["echo", "openscientist-agent image built"]

volumes:
  postgres_data:
